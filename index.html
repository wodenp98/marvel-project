<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/sass/main.css" />
    <script src="https://kit.fontawesome.com/a31756020a.js" crossorigin="anonymous"></script>
    <title>Marvel Board</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title" aria-label="Nom du site">Marvel Board</h1>
    <a href="https://auntm.ai/champions"><img src="/assets/logoAuntmia.png" class="logoAunt" alt="Logo Auntm.ia"></a>
      <a href="https://forums.playcontestofchampions.com/en">
        <img
          src="/assets/logoKabam.svg"
          class="logoKabam"
          alt="Logo de Kabam"
        />
      </a>
    </header>
    <main>
      <div id="filter-system">
        <div id="class-filter">
          <div class="container-class-filter">
            <div class="container-button">
              <div class="icon-class disabled-science" title="Science"></div>
            </div>
            <div class="container-button"> 
              <div class="icon-class disabled-skill" title="Virtuose"></div>
            </div>
            <div class="container-button">
              <button class="icon-class disabled-mutant" title="Mutant"></button>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button">
              <div class="icon-class disabled-tech" title="Tech"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled-cosmic" title="Cosmique"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled-mystic" title="Mystique"></div>
            </div>
          </div>
        </div>
        <div id="stars-filter">
          <button class="stars-button">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
          <button class="stars-button">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
        </div>
        <div id="rank-filter">
          <div class="container-rank-filter">
            <button class="rank-button">1</button>
            <button class="rank-button">2</button>
            <button class="rank-button">3</button>
          </div>
          <div class="container-rank-filter">
            <button class="rank-button">4</button>
            <button class="rank-button">5</button>
          </div>
        </div>
        <div id="immunity-filter">
          <div class="container-class-filter">
            <div class="container-button">
              <div class="icon-class disabled" title="Immu saignement"><img class="immunity-icon" src="/assets/immunity-grey/saignement.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu poison"><img class="immunity-icon" src="/assets/immunity-grey/poison.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu incinération"><img class="immunity-icon" src="/assets/immunity-grey/incinération.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu décharge"><img class="immunity-icon" src="/assets/immunity-grey/décharge.png"></div>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button">
              <div class="icon-class disabled" title="Immu bloc soin"><img class="immunity-icon" src="/assets/immunity-grey/bloc-soin.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu brise armure"><img class="immunity-icon" src="/assets/immunity-grey/brise-armure.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu chancellement"><img class="immunity-icon" src="/assets/immunity-grey/chancellement.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu controles inversés"><img class="immunity-icon" src="/assets/immunity-grey/controles-inverses.png"></div>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button">
              <div class="icon-class disabled" title="Immu désorienter"><img class="immunity-icon" src="/assets/immunity-grey/desorienter.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu ralentissement"><img class="immunity-icon" src="/assets/immunity-grey/ralentissement.png"></div>
            </div>
            <div class="container-button">
              <div class="icon-class disabled" title="Immu vague de froid"><img class="immunity-icon" src="/assets/immunity-grey/vague-de-froid.png"></div>
            </div>
        </div>
        </div>
        <div id="cs-filter">
        <select name="comp-spe" id="cs-select">
          <option selected>Comp.spé</option>
        </select>
        </div>
      </div>
      <div id="reset-button"><i class="fa-regular fa-circle-xmark" title="Reset filtre"></i></div>
      <div id="container">
        <section class="search">
          <form class="search-bar">
            <input autocomplete="off" placeholder="Rechercher un héros..." type="text" id="search-input" class="search-input" name="search-input">
          </form>
        </section>
        <section id="section-heroes">
        </section>
      </div>
    </main>
    <footer></footer>
    <script src="/src/index.js"></script>
    <script src="/src/containers/immunityFactories.js"></script>
    <script src="/src/containers/csFactories.js"></script>
    <script src="/src/containers/herosFactories.js"></script>
  </body>
</html>
