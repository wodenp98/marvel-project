<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/sass/main.css" />
    <script src="https://kit.fontawesome.com/a31756020a.js" crossorigin="anonymous"></script>
    <title>Marvel Board</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title" aria-label="Nom du site">Marvel Board</h1>
    <a href="https://auntm.ai/champions"><img src="/assets/logoAuntmia.png" class="logoAunt" alt="Logo Auntm.ia"></a>
      <a href="https://forums.playcontestofchampions.com/en">
        <img
          src="/assets/logoKabam.svg"
          class="logoKabam"
          alt="Logo de Kabam"
        />
      </a>
    </header>
    <main>
      <div id="filter-system">
        <div id="class-filter">
          <div class="container-class-filter">
            <div class="container-button border-button" title="Science">
              <div class="icon disabled-science"></div>
            </div>
            <div class="container-button border-button" title="Virtuose"> 
                <div class="icon disabled-skill"></div>
            </div>
            <div class="container-button border-button" title="Mutant">
              <div class="icon disabled-mutant"></div>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button border-button" title="Tech">
              <div class="icon disabled-tech"></div>
            </div>
            <div class="container-button border-button" title="Cosmique">
              <div class="icon disabled-cosmic"></div>
            </div>
            <div class="container-button border-button" title="Mystique">
              <div class="icon disabled-mystic"></div>
            </div>
          </div>
        </div>
        <div id="stars-filter">
          <button class="stars-button">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
          <button class="stars-button">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
        </div>
        <div id="rank-filter">
          <div class="container-rank-filter">
            <button class="rank-button">1</button>
            <button class="rank-button">2</button>
            <button class="rank-button">3</button>
          </div>
          <div class="container-rank-filter">
            <button class="rank-button">4</button>
            <button class="rank-button">5</button>
          </div>
        </div>
        <div id="immunity-filter">
          <div class="container-class-filter">
            <div class="container-button border-button" title="Immu saignement">
              <div class="icon disabled-bleed"></div>
            </div>
            <div class="container-button border-button" title="Immu poison">
              <div class="icon disabled-poison" title="Immu poison"></div>
            </div>
            <div class="container-button border-button" title="Immu incinération">
              <div class="icon disabled-incineration"></div>
            </div>
            <div class="container-button border-button" title="Immu décharge">
              <div class="icon disabled-decharge"></div>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button border-button" title="Immu bloc soin">
              <div class="icon disabled-bloc-soin"></div>
            </div>
            <div class="container-button border-button" title="Immu brise armure">
              <div class="icon disabled-brise-armure"></div>
            </div>
            <div class="container-button border-button" title="Immu chancellement">
              <div class="icon disabled-chancellement"></div>
            </div>
            <div class="container-button border-button" title="Immu controles inversés">
              <div class="icon disabled-controles"></div>
            </div>
          </div>
          <div class="container-class-filter">
            <div class="container-button border-button" title="Immu désorienter">
              <div class="icon disabled-desorienter"></div>
            </div>
            <div class="container-button border-button" title="Immu ralentissement">
              <div class="icon disabled-ralentissement"></div>
            </div>
            <div class="container-button border-button" title="Immu vague de froid">
              <div class="icon disabled-coldsnap"></div>
            </div>
        </div>
        </div>
        <div id="cs-filter">
        <select name="comp-spe" id="cs-select">
          <option selected>Comp.spé</option>
        </select>
        </div>
      </div>
      <div id="reset-button"><i class="fa-regular fa-circle-xmark" title="Reset filtre"></i></div>
      <div id="container">
        <section class="search">
          <form class="search-bar">
            <input autocomplete="off" placeholder="Rechercher un héros..." type="text" id="search-input" class="search-input" name="search-input">
          </form>
        </section>
        <section id="section-heroes">
        </section>
      </div>
    </main>
    <footer></footer>
    <script src="/src/index.js"></script>
    <script src="/src/containers/immunityFactories.js"></script>
    <script src="/src/containers/csFactories.js"></script>
    <script src="/src/containers/herosFactories.js"></script>
  </body>
</html>
