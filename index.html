<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/1a22d99172.js" crossorigin="anonymous"></script> 
    <title>Marvel Board</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title" aria-label="Nom du site">Marvel Board</h1>
      <a href="https://kabam.com/games/marvel-contest-of-champions/">
        <img
          src="/assets/logoKabam.svg"
          class="logoKabam"
          alt="Logo de Kabam"
        />
      </a>
    </header>
    <main>
      <div id="filter-system">
        <div id="class-filter">
          <div class="container-class-filter">
            <button><img src="/assets/class/science.svg"></button>
            <button><img src="/assets/class/skill.svg"></button>
            <button><img src="/assets/class/mutant.svg"></button>
          </div>
          <div class="container-filter">
            <button><img src="/assets/class/tech.svg"></button>
            <button><img src="/assets/class/cosmic.svg"></button>
            <button><img src="/assets/class/mystic.svg"></button>
          </div>
        </div>
        <div id="stars-filter">
          <button>
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
          <button>
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
            <img class="stars" src="/assets/stars.png">
          </button>
        </div>
        <div id="rank-filter">
          <div class="container-rank-filter">
            <button>1</button>
            <button>2</button>
            <button>3</button>
          </div>
          <div class="container-rank-filter">
            <button>4</button>
            <button>5</button>
          </div>
        </div>
        <div id="immunity-filter">
          <select name="immunity" id="immunity-select">
            <option value="">Immunité</option>
          </select>
        </div>
        <div id="cs-filter">
          <button>Comp.spé</button>
        </div>
      </div>

      <div id="container">
        <form class="search-bar"></form>
        <section id="section-heroes"></section>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
